name: Fetch Polymarket Changelog

on:
  schedule:
    - cron: '20 1 * * *'   # 每天 09:20 CST (01:50 UTC)，在 Dify 10:00 触发前更新
  workflow_dispatch:        # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch changelog.md
        run: |
          curl -s -L --max-time 60 \
            "https://docs.polymarket.com/changelog.md" \
            -o changelog.md
          echo "Fetched $(wc -c < changelog.md) bytes"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changelog.md
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update changelog $(date -u +%Y-%m-%d)"
            git push
          fi
